version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: lf-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch (e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}).ok
          }
        "
      interval: 10s
      timeout: 30s
      start_period: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: lf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:
  mongo_config:
  redis_data:
